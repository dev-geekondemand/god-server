# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - god-test-backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip azure]')"
    permissions:
      contents: write  # needed to create releases
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Zip artifact for deployment
        run: zip -r release.zip . --exclude "*.git*" --exclude "node_modules/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: deploy-${{ github.run_number }}
          name: Deploy ${{ github.run_number }}
          files: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download release zip
        run: |
          curl -L \
            --retry 3 \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o release.zip \
            "https://github.com/${{ github.repository }}/releases/download/deploy-${{ github.run_number }}/release.zip"
          
          # Verify the file is a valid zip
          file release.zip
          ls -lh release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_68133793E7B5448DAEE3648285FB0718 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CE60EBB4398F417E99A798ED02DD2616 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AC04849FBA6A4000A6656E18D9AE0A42 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'god-test-backend'
          slot-name: 'Production'
          package: .